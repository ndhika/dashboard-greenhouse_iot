<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Greenhouse Otomatis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .animate-slow-pulse { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body class="bg-slate-55 text-slate-800 font-sans min-h-screen p-4 md:p-8">
  <div class="max-w-7xl mx-auto space-y-6">
    
    <div class="bg-white rounded-2xl shadow-sm p-6 flex flex-col md:flex-row items-start md:items-center justify-between border border-slate-200">
      <div class="flex items-center space-x-4">
        <div class="w-14 h-14 bg-gradient-to-tr from-green-500 to-emerald-400 rounded-xl flex items-center justify-center text-white shadow-md">
          <i class="fa-solid fa-leaf text-2xl"></i>
        </div>
        <div>
          <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">Smart <span class="text-green-600">Greenhouse</span></h1>
          <p class="text-slate-500 font-medium text-sm mt-1">UAS Orakom - Simulasi IoT Komputer Generasi 5</p>
        </div>
      </div>
      <div class="flex items-center space-x-3 mt-4 md:mt-0 bg-slate-100 px-4 py-2 rounded-full border border-slate-200">
        <div id="connectionStatus" class="w-3 h-3 rounded-full bg-red-500 shadow-sm animate-slow-pulse"></div>
        <span id="connectionText" class="text-sm font-bold text-slate-600 uppercase tracking-wider">Menghubungkan...</span>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
      <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 flex flex-col justify-between">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Suhu Udara</p>
            <h2 class="text-4xl font-black text-slate-700 mt-2"><span id="suhuValue">--</span><span class="text-lg text-slate-400 font-medium ml-1">°C</span></h2>
          </div>
          <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500">
            <i class="fa-solid fa-temperature-half text-lg"></i>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 flex flex-col justify-between">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Kelembaban</p>
            <h2 class="text-4xl font-black text-slate-700 mt-2"><span id="kelembabanValue">--</span><span class="text-lg text-slate-400 font-medium ml-1">%</span></h2>
          </div>
          <div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center text-green-500">
            <i class="fa-solid fa-droplet text-lg"></i>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 flex flex-col justify-between">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Intensitas Cahaya</p>
            <h2 class="text-4xl font-black text-slate-700 mt-2"><span id="cahayaValue">--</span></h2>
          </div>
          <div class="w-10 h-10 rounded-full bg-yellow-50 flex items-center justify-center text-yellow-500">
            <i class="fa-solid fa-sun text-lg"></i>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-5 border border-slate-200 flex flex-col justify-between">
        <div class="flex space-x-2 h-full">
          <button id="btnBuka" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold rounded-xl transition-all shadow-sm active:scale-95 flex flex-col items-center justify-center gap-1">
            <i class="fa-solid fa-arrow-up-from-bracket text-lg"></i> <span class="text-xs">BUKA ATAP</span>
          </button>
          <button id="btnTutup" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition-all shadow-sm active:scale-95 flex flex-col items-center justify-center gap-1">
            <i class="fa-solid fa-arrow-down-to-bracket text-lg"></i> <span class="text-xs">TUTUP ATAP</span>
          </button>
        </div>
        <div class="mt-3 text-center">
          <span id="statusAtap" class="text-[11px] font-bold text-slate-500 uppercase tracking-widest"><i class="fa-solid fa-circle text-slate-300 mr-1"></i> Menunggu...</span>
        </div>
      </div>
    </div>

    <div class="bg-[#121212] rounded-2xl shadow-lg p-6 border border-slate-800 pb-10">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-sm font-bold text-slate-200 uppercase tracking-wider flex items-center">
          <i class="fa-solid fa-chart-line text-blue-500 mr-2"></i> Log Multisensor Real-time
        </h3>
        <div class="flex items-center space-x-4">
            <span class="text-xs text-slate-400 font-medium"><i class="fa-solid fa-square text-blue-500 mr-1"></i> Suhu</span>
            <span class="text-xs text-slate-400 font-medium"><i class="fa-solid fa-square text-green-500 mr-1"></i> Kelembaban</span>
            <span class="text-xs text-slate-400 font-medium"><i class="fa-solid fa-square text-yellow-500 mr-1"></i> Cahaya</span>
        </div>
      </div>
      <div class="w-full h-80">
        <canvas id="mainChart"></canvas>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
