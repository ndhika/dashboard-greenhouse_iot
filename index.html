<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Greenhouse Otomatis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-4 md:p-8">
  <div class="max-w-6xl mx-auto space-y-6">
    <div class="bg-white rounded-2xl shadow-sm p-6 flex items-center justify-between border border-slate-100">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-green-700">Greenhouse Dashboard</h1>
        <p class="text-slate-500 mt-1">Sistem Otomatisasi Atap Berbasis IoT</p>
      </div>
      <div class="flex items-center space-x-2">
        <div id="connectionStatus" class="w-3 h-3 rounded-full bg-red-500"></div>
        <span id="connectionText" class="text-sm font-medium text-slate-600">Terputus</span>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 flex flex-col justify-between">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-sm font-medium text-slate-500">Suhu Udara</p>
            <h2 class="text-4xl font-bold text-slate-800 mt-2"><span id="suhuValue">--</span><span class="text-xl text-slate-400"> °C</span></h2>
          </div>
          <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-500">
            <i class="fa-solid fa-temperature-half"></i>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 flex flex-col justify-between">
        <div class="flex justify-between items-start">
          <div>
            <p class="text-sm font-medium text-slate-500">Intensitas Cahaya</p>
            <h2 class="text-4xl font-bold text-slate-800 mt-2"><span id="cahayaValue">--</span></h2>
          </div>
          <div class="w-10 h-10 rounded-full bg-yellow-100 flex items-center justify-center text-yellow-500">
            <i class="fa-solid fa-sun"></i>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
        <p class="text-sm font-medium text-slate-500 mb-4">Kontrol Atap (Manual)</p>
        <div class="space-y-3">
          <button id="btnBuka" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-xl transition-colors shadow-sm">
            <i class="fa-solid fa-arrow-up mr-2"></i> Buka Atap
          </button>
          <button id="btnTutup" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-3 rounded-xl transition-colors shadow-sm">
            <i class="fa-solid fa-arrow-down mr-2"></i> Tutup Atap
          </button>
        </div>
        <div class="mt-4 pt-4 border-t border-slate-100 flex justify-between items-center">
          <span class="text-sm text-slate-500">Status Aktuator:</span>
          <span id="statusAtap" class="text-sm font-bold text-slate-700 bg-slate-100 px-3 py-1 rounded-full">Menunggu...</span>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
      <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center">
        <i class="fa-solid fa-chart-line text-green-500 mr-2"></i> Log Perubahan Suhu
      </h3>
      <div class="w-full h-72">
        <canvas id="logChart"></canvas>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
